const nrm = s => s.toLowerCase().replace(/[ëéê]/g,"e").replace(/[ï]/g,"i").replace(/[ö]/g,"o").replace(/[ü]/g,"u").replace(/[ä]/g,"a");

const LC = {groen:"#16a34a", geel:"#d97706", rood:"#dc2626"};

function related(topic) {
  const ws = topic.toLowerCase().split(/\s+/).filter(w => w.length > 2);
  return DATA
    .map(p => ({p, s: ws.reduce((s,w) => s + (p.question.toLowerCase().includes(w) ? 3 : 0), 0)}))
    .filter(x => x.s > 0).sort((a,b) => b.s-a.s).slice(0,3).map(x => x.p);
}

function zoekPolls(q) {
  const t = nrm(q.trim());
  if (t.length < 2) return null;
  return DATA
    .filter(p => nrm(p.question).includes(t) || p.answers.some(a => nrm(a.label).includes(t)))
    .map(p => ({...p, max: Math.max(...p.answers.map(a => a.pct))}))
    .sort((a,b) => b.date.localeCompare(a.date));
}

function themaPolls(id) {
  const t = THEMAS.find(t => t.id === id);
  if (!t) return [];
  return DATA
    .filter(p => t.kw.some(k => nrm(p.question).includes(k)))
    .map(p => ({...p, max: Math.max(...p.answers.map(a => a.pct))}));
}

function PollCard({poll}) {
  const mx = Math.max(...poll.answers.map(a => a.pct));
  const c  = mx < 65 ? "#16a34a" : mx < 80 ? "#d97706" : "#dc2626";
  return (
    <div style={{...card, borderLeft:"4px solid "+c}}>

        <span style={{fontSize:11, color:"#aaa"}}>{poll.date} &middot; {poll.total.toLocaleString()} stemmen</span>

function Generator() {
  const [topic,   setTopic]   = useState("");
  const [ctx,     setCtx]     = useState("");
  const [loading, setLoading] = useState(false);
  const [result,  setResult]  = useState(null);
  const [error,   setError]   = useState(null);
  const [rel,     setRel]     = useState([]);
  const [open,    setOpen]    = useState(null);
  const [refI,    setRefI]    = useState(null);
  const [refTxt,  setRefTxt]  = useState({});
  const [refLoad, setRefLoad] = useState(null);
  const [fLoad,   setFLoad]   = useState(false);
  const [fErr,    setFErr]    = useState(null);

  async function go() {
    if (!topic.trim()) return;
    setLoading(true); setResult(null); setError(null); setOpen(null); setRefI(null);
    setRel(related(topic));
    try {
      const r = await fetch("https://api.anthropic.com/v1/messages", {
        method:"POST",
        headers:{"Content-Type":"application/json","x-api-key":window._key||"","anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
        body:JSON.stringify({
          model:"claude-sonnet-4-20250514",
          max_tokens:2000,
          system:PROMPT,
          messages:[{role:"user", content:"Onderwerp: "+topic+(ctx.trim() ? "\n\nContext:\n"+ctx : "")}]
        })
      });
      const d = await r.json();
      const txt = d.content.map(b => b.text||"").join("");
      setResult(JSON.parse(txt.replace(/```json|```/g,"").trim()));
    } catch(e) {
      setError("Genereren mislukt. Controleer je API-sleutel.");
    } finally {
      setLoading(false);
    }
  }

  async function refine(i, inst) {
    const p = result.polls[i];
    setRefLoad(i);
    try {
      const r = await fetch("https://api.anthropic.com/v1/messages", {
        method:"POST",
        headers:{"Content-Type":"application/json","x-api-key":window._key||"","anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
        body:JSON.stringify({
          model:"claude-sonnet-4-20250514",
          max_tokens:400,
          system:'Pas een ON pollvraag aan. Geef ALLEEN dit JSON: {"vraag":"...","antwoorden":["...","..."],"verdeling":"55% / 45%","label":"groen","uitleg":"..."}',
          messages:[{role:"user", content:"Vraag: "+p.vraag+"\nAntwoorden: "+p.antwoorden.join(" / ")+"\nInstructie: "+inst}]
        })
      });
      const d = await r.json();
      const upd = JSON.parse(d.content.map(b=>b.text||"").join("").replace(/```json|```/g,"").trim());
      const ps = [...result.polls]; ps[i] = upd;
      setResult({...result, polls:ps}); setRefI(null); setRefTxt(x=>({...x,[i]:""}));
    } catch(e) {} finally { setRefLoad(null); }
  }

  async function onFile(e) {
    const file = e.target.files[0]; if (!file) return;
    setFLoad(true); setFErr(null);
    try {
      const ext = file.name.split(".").pop().toLowerCase();
      if (ext==="txt") {
        setCtx((await file.text()).slice(0,8000));
      } else if (ext==="pdf") {
        const b64 = await new Promise((res,rej) => {
          const rd = new FileReader();
          rd.onload = () => res(rd.result.split(",")[1]);
          rd.onerror = rej;
          rd.readAsDataURL(file);
        });
        const r = await fetch("https://api.anthropic.com/v1/messages", {
          method:"POST",
          headers:{"Content-Type":"application/json","x-api-key":window._key||"","anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
          body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,
            messages:[{role:"user",content:[
              {type:"document",source:{type:"base64",media_type:"application/pdf",data:b64}},
              {type:"text",text:"Geef de tekst terug."}
            ]}]})
        });
        const d = await r.json();
        setCtx(d.content.map(b=>b.text||"").join("").slice(0,8000));
      } else if (ext==="docx" || ext==="doc") {
        if (!window.mammoth) {
          await new Promise((res,rej) => {
            const s = document.createElement("script");
            s.src = "https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js";
            s.onload = res; s.onerror = rej;
            document.head.appendChild(s);
          });
        }
        const r = await window.mammoth.extractRawText({arrayBuffer: await file.arrayBuffer()});
        setCtx(r.value.slice(0,8000));
      } else {
        setFErr("Gebruik PDF, Word of TXT.");
      }
    } catch(e) {
      setFErr("Kan bestand niet inlezen.");
    } finally {
      setFLoad(false); e.target.value = "";
    }
  }

  const SNEL = ["Maak neutraler","Maak scherper","Voeg derde antwoord toe","Persoonlijke vraag","Meer verdeeld","Meerkeuze"];
  const lbl = {fontSize:12, fontWeight:600, color:"#666", marginBottom:6, display:"block"};

  return (
    <div style={{display:"grid", gridTemplateColumns:rel.length ? "1fr 300px" : "1fr", gap:20, alignItems:"start"}}>
      <div>
        <div style={card}>
          <label style={lbl}>Onderwerp of actualiteit</label>
          <div style={{display:"flex", gap:10, marginBottom:16}}>
            <textarea
              value={topic}
              onChange={e => setTopic(e.target.value)}
              onKeyDown={e => { if (e.key==="Enter" && !e.shiftKey) { e.preventDefault(); go(); }}}
              placeholder="Bijv: energieprijzen, kabinet Jetten, NAVO-bijdrage..."
              rows={2}
              style={{...inp, flex:1, resize:"none", lineHeight:1.5}}
            />
            <button
              onClick={go}
              disabled={loading || !topic.trim()}
              style={{...btn, opacity: loading||!topic.trim() ? 0.5 : 1, cursor: loading||!topic.trim() ? "not-allowed" : "pointer"}}
            >
              {loading ? "Laden..." : "Genereer"}
            </button>
          </div>

          <label style={lbl}>Nieuwscontext <span style={{fontWeight:400, color:"#bbb"}}>- optioneel</span></label>
          <div style={{position:"relative", marginBottom:8}}>
            <textarea
              value={ctx}
              onChange={e => setCtx(e.target.value)}
              rows={3}
              placeholder="Plak een nieuwsbericht voor meer gerichte pollvragen..."
              style={{...inp, lineHeight:1.5, resize:"vertical", paddingRight:36}}
            />
            {ctx && (
              <button onClick={() => { setCtx(""); setFErr(null); }} style={{position:"absolute",top:8,right:10,background:"none",border:"none",color:"#ccc",fontSize:18,cursor:"pointer",lineHeight:1}}>
                x
              </button>
            )}
          </div>
          <div style={{display:"flex", alignItems:"center", gap:10}}>
            <label style={{background:"#f5f5f5",border:"1px solid #e0e0e0",borderRadius:6,padding:"5px 12px",fontSize:12,color:fLoad?"#bbb":"#555",cursor:"pointer"}}>
              {fLoad ? "Laden..." : "Bestand uploaden (PDF/Word)"}
              <input type="file" accept=".pdf,.doc,.docx,.txt" style={{display:"none"}} disabled={fLoad} onChange={onFile}/>
            </label>
            {fErr && <span style={{fontSize:12,color:"#dc2626"}}>{fErr}</span>}
            {ctx && <span style={{fontSize:12,color:"#bbb"}}>{ctx.length.toLocaleString()} tekens</span>}
          </div>
        </div>

        {error && (
          <div style={{background:"#fef2f2",border:"1px solid #fca5a5",borderRadius:8,padding:"12px 16px",color:"#dc2626",fontSize:14,marginBottom:14}}>
            {error}
          </div>
        )}

        {loading && (
          <div style={{...card, textAlign:"center", padding:"40px"}}>
            <div style={{fontSize:14, color:"#888", marginBottom:4}}>Pollvragen genereren...</div>
            <div style={{fontSize:12, color:"#bbb"}}>Dit duurt 10-20 seconden</div>
          </div>
        )}

        {!result && !loading && !error && (
          <div style={{...card, textAlign:"center", padding:"40px", background:"#fafafa", border:"2px dashed #e8e8e8", boxShadow:"none"}}>
            <div style={{fontSize:32, marginBottom:8}}>📊</div>
            <div style={{fontSize:15, color:"#999", fontWeight:600}}>Voer een onderwerp in en klik Genereer</div>
          </div>
        )}

        {result && (
          <div>
            <div style={{...card, background:"#fffbf0", borderLeft:"4px solid #f59e0b", border:"1px solid #fde68a"}}>
              <div style={{fontSize:11, fontWeight:700, color:"#92400e", textTransform:"uppercase", letterSpacing:1, marginBottom:4}}>Analyse</div>
              <div style={{fontSize:14, color:"#78350f", lineHeight:1.6}}>{result.analysis}</div>
            </div>

            {result.polls && result.polls.map((poll, i) => {
              const lbl2 = poll.label || "geel";
              const isRef = refI === i;
              return (
                <div key={i} style={{...card, borderLeft:"4px solid "+LC[lbl2]}}>
                  <div style={{display:"flex", gap:10, alignItems:"flex-start", marginBottom:10}}>
                    <span style={{background:"#f0f0f0", color:"#666", fontSize:12, fontWeight:700, padding:"3px 8px", borderRadius:5, marginTop:2}}>#{i+1}</span>
                    <h3 style={{margin:0, fontSize:15, fontWeight:700, color:"#111", lineHeight:1.4, flex:1}}>{poll.vraag}</h3>
                  </div>
                  <div style={{display:"flex", flexWrap:"wrap", gap:7, marginBottom:10, paddingLeft:36}}>
                    {poll.antwoorden && poll.antwoorden.map((a,j) => (
                      <span key={j} style={{background:j===0?"#eff6ff":"#f9fafb", border:"1px solid "+(j===0?"#bfdbfe":"#e5e7eb"), color:j===0?"#1d4ed8":"#374151", padding:"4px 12px", fontSize:13, borderRadius:16}}>
                        {a}
                      </span>
                    ))}
                  </div>
                  <div style={{paddingLeft:36, display:"flex", alignItems:"center", gap:8, marginBottom:8}}>
                    <span style={{background:LB[lbl2], color:LC[lbl2], fontSize:13, fontWeight:600, padding:"3px 10px", borderRadius:16}}>
                      {poll.verdeling || poll.verwachte_verdeling || ""}
                    </span>
                    <span style={{fontSize:12, color:"#aaa"}}>{LT[lbl2]||""}</span>
                  </div>
                  <div style={{paddingLeft:36, marginBottom:8}}>
                    <button onClick={() => setOpen(open===i ? null : i)} style={gBtn}>
                      {open===i ? "Verberg toelichting" : "Toon toelichting"}
                    </button>
                    {open===i && (
                      <div style={{background:"#f9fafb", borderRadius:8, padding:"12px", fontSize:13, color:"#555", lineHeight:1.7, marginTop:8}}>
                        <strong>Waarom verdeeld? </strong>{poll.uitleg}
                      </div>
                    )}
                  </div>
                  <div style={{paddingLeft:36, borderTop:"1px solid #f0f0f0", paddingTop:10}}>
                    {!isRef && (
                      <button onClick={() => { setRefI(i); setOpen(null); }} style={{...gBtn, color:"#e8352a", borderColor:"#fca5a5"}}>
                        Pas vraag aan
                      </button>
                    )}
                    {isRef && (
                      <div>
                        <div style={{fontSize:12, fontWeight:600, color:"#888", marginBottom:8}}>Verfijn deze vraag:</div>
                        <div style={{display:"flex", flexWrap:"wrap", gap:6, marginBottom:8}}>
                          {SNEL.map(opt => (
                            <button key={opt} onClick={() => refine(i,opt)} disabled={refLoad===i} style={gBtn}>{opt}</button>
                          ))}
                        </div>
                        <div style={{display:"flex", gap:8}}>
                          <input
                            value={refTxt[i]||""}
                            onChange={e => setRefTxt(x => ({...x,[i]:e.target.value}))}
                            onKeyDown={e => { if (e.key==="Enter" && refTxt[i]?.trim()) refine(i,refTxt[i]); }}
                            placeholder="Eigen instructie..."
                            disabled={refLoad===i}
                            style={{...inp, flex:1, padding:"7px 12px"}}
                          />
                          <button
                            onClick={() => refTxt[i]?.trim() && refine(i,refTxt[i])}
                            disabled={refLoad===i || !refTxt[i]?.trim()}
                            style={{...btn, opacity:refLoad===i||!refTxt[i]?.trim()?0.5:1, padding:"7px 16px", fontSize:13}}
                          >
                            {refLoad===i ? "..." : "Toepassen"}
                          </button>
                          <button onClick={() => { setRefI(null); setRefTxt(x=>({...x,[i]:""})); }} style={gBtn}>
                            Annuleer
                          </button>
                        </div>
                      </div>
                    )}
                  </div>
                </div>
              );
            })}
          </div>
        )}
      </div>

      {rel.length > 0 && (
        <div>
          <div style={{fontSize:12, fontWeight:700, color:"#aaa", textTransform:"uppercase", letterSpacing:1, marginBottom:10}}>Eerder gesteld</div>
          {rel.map(poll => <PollCard key={poll.id} poll={poll}/>)}
        </div>
      )}
    </div>
  );
}

// ── Archief tab ───────────────────────────────────────────────────────────────

function Archief() {
  const [thema, setThema] = useState(null);
  const [zoek,  setZoek]  = useState("");

  const withMax   = DATA.map(p => ({...p, max:Math.max(...p.answers.map(a=>a.pct))}));
  const zoekRes   = zoekPolls(zoek);
  const tPolls    = thema ? themaPolls(thema) : [];
  const verdeeld  = [...withMax].sort((a,b) => a.max-b.max).slice(0,20);
  const eenzijdig = [...withMax].sort((a,b) => b.max-a.max).slice(0,20);

  return (
    <div>
      <div style={{...card, marginBottom:16}}>
        <div style={{position:"relative"}}>
          <input
            value={zoek}
            onChange={e => { setZoek(e.target.value); setThema(null); }}
            placeholder="Zoek op trefwoord..."
            style={{...inp, paddingLeft:36}}
            onFocus={e => e.target.style.borderColor="#e8352a"}
            onBlur={e => e.target.style.borderColor="#ddd"}
          />
          <span style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",color:"#bbb",pointerEvents:"none"}}>🔍</span>
          {zoek && (
            <button onClick={() => setZoek("")} style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",color:"#bbb",fontSize:16,cursor:"pointer"}}>
              x
            </button>
          )}
        </div>
        {zoekRes && <div style={{fontSize:13,color:"#888",marginTop:8}}>{zoekRes.length} resultaten voor "{zoek}"</div>}
      </div>

      {zoekRes ? (
        zoekRes.length === 0
          ? <div style={{textAlign:"center",padding:40,color:"#bbb"}}>Geen polls gevonden.</div>
          : <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
              {zoekRes.map(p => <PollCard key={p.id} poll={p}/>)}
            </div>
      ) : (
        <div>
          <Themas active={thema} set={setThema}/>
          {thema && tPolls.length > 0 && (
            <div>
              <div style={{fontSize:13,fontWeight:600,color:"#666",marginBottom:14}}>
                {THEMAS.find(t=>t.id===thema)?.label} &mdash; {tPolls.length} polls
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
                {tPolls.sort((a,b)=>a.max-b.max).map(p => <PollCard key={p.id} poll={p}/>)}
              </div>
            </div>
          )}
          {thema && tPolls.length === 0 && (
            <div style={{textAlign:"center",padding:40,color:"#bbb"}}>Geen polls gevonden voor dit thema.</div>
          )}
          {!thema && (
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:24}}>
              <div>
                <div style={{fontSize:13,fontWeight:700,color:"#16a34a",marginBottom:14}}>Meest verdeeld</div>
                {verdeeld.map(p => <PollCard key={p.id} poll={p}/>)}
              </div>
              <div>
                <div style={{fontSize:13,fontWeight:700,color:"#dc2626",marginBottom:14}}>Meest eenzijdig</div>
                {eenzijdig.map(p => <PollCard key={p.id} poll={p}/>)}
              </div>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ── Opkomst tab ───────────────────────────────────────────────────────────────

function Opkomst() {
  const [thema, setThema] = useState(null);
  const recent   = DATA.filter(p => p.date >= "2024-01-01");
  const filtered = thema ? themaPolls(thema).filter(p => p.date >= "2024-01-01") : recent;
  const meeste   = [...filtered].sort((a,b) => b.total-a.total).slice(0,10);
  const minste   = [...filtered].filter(p => p.total > 50).sort((a,b) => a.total-b.total).slice(0,10);
  const sub      = thema ? " - "+THEMAS.find(t=>t.id===thema)?.label : "";

  return (
    <div>
      <Themas active={thema} set={setThema}/>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:24}}>
        <div>
          <div style={{fontSize:13,fontWeight:700,color:"#d97706",marginBottom:4}}>Meeste stemmen</div>
          <div style={{fontSize:12,color:"#bbb",marginBottom:14}}>2024-2026{sub}</div>
          {meeste.length > 0 ? meeste.map(p => (
            <div key={p.id} style={{...card,borderLeft:"4px solid #f59e0b"}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
                <span style={{fontSize:11,color:"#aaa"}}>{p.date}</span>
                <span style={{fontSize:14,fontWeight:700,color:"#d97706"}}>{p.total.toLocaleString()} stemmen</span>
              </div>
              <div style={{fontSize:14,color:"#111",fontWeight:600,lineHeight:1.4,marginBottom:10}}>{p.question}</div>
              <Bars answers={p.answers} color="#f59e0b"/>
            </div>
          )) : <div style={{color:"#bbb",fontSize:13}}>Geen polls gevonden.</div>}
        </div>
        <div>
          <div style={{fontSize:13,fontWeight:700,color:"#6b7280",marginBottom:4}}>Minste stemmen</div>
          <div style={{fontSize:12,color:"#bbb",marginBottom:14}}>2024-2026{sub}</div>
          {minste.length > 0 ? minste.map(p => (
            <div key={p.id} style={{...card,borderLeft:"4px solid #d1d5db"}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
                <span style={{fontSize:11,color:"#aaa"}}>{p.date}</span>
                <span style={{fontSize:14,fontWeight:700,color:"#6b7280"}}>{p.total.toLocaleString()} stemmen</span>
              </div>
              <div style={{fontSize:14,color:"#111",fontWeight:600,lineHeight:1.4,marginBottom:10}}>{p.question}</div>
              <Bars answers={p.answers} color="#9ca3af"/>
            </div>
          )) : <div style={{color:"#bbb",fontSize:13}}>Geen polls gevonden.</div>}
        </div>
      </div>
    </div>
  );
}

// ── App ───────────────────────────────────────────────────────────────────────

function App() {
  const [tab, setTab] = useState("generator");
  const TABS = [
    {id:"generator", label:"Poll genereren"},
    {id:"archief",   label:"Archief"},
    {id:"opkomst",   label:"Opkomst"},
  ];
  return (
    <div style={{minHeight:"100vh", background:"#f6f6f6", fontFamily:"system-ui,-apple-system,sans-serif", color:"#111"}}>
      <div style={{background:"#e8352a"}}>
        <div style={{padding:"18px 32px 0"}}>
          <div style={{fontSize:11,letterSpacing:2,textTransform:"uppercase",color:"rgba(255,255,255,0.7)",marginBottom:4}}>
            Ongehoord Nederland
          </div>
          <h1 style={{margin:0,fontSize:24,fontWeight:800,color:"#fff",marginBottom:14}}>
            PollGenerator
          </h1>
          <div style={{display:"flex",gap:4}}>
            {TABS.map(t => (
              <button key={t.id} onClick={() => setTab(t.id)} style={{
                background: tab===t.id ? "#fff" : "transparent",
                color: tab===t.id ? "#e8352a" : "rgba(255,255,255,0.85)",
                border:"none", borderRadius:"7px 7px 0 0",
                padding:"9px 18px", fontSize:13,
                fontWeight: tab===t.id ? 700 : 500,
                cursor:"pointer", fontFamily:"inherit"
              }}>{t.label}</button>
            ))}
          </div>
        </div>
      </div>
      <div style={{padding:"24px 32px", maxWidth:960, margin:"0 auto"}}>
        {tab==="generator" && <Generator/>}
        {tab==="archief"   && <Archief/>}
        {tab==="opkomst"   && <Opkomst/>}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
